<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Billing — SmartReview</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
.menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
.menu-card { border:1.5px solid var(--border); border-radius:var(--radius); padding:12px; cursor:pointer; transition:var(--transition); background:var(--white); position:relative; }
.menu-card:hover { border-color:var(--brand); box-shadow:var(--shadow); transform:translateY(-1px); }
.menu-card.unavailable { opacity:.45; cursor:not-allowed; }
.menu-card.in-order { border-color:var(--brand); background:var(--brand-l); }
.menu-emoji { font-size:1.8rem; margin-bottom:6px; }
.menu-name  { font-size:.85rem; font-weight:700; margin-bottom:3px; line-height:1.3; }
.menu-price { font-size:.95rem; font-weight:800; color:var(--brand); }
.menu-cat   { font-size:.7rem; color:var(--text-muted); margin-top:2px; }
.veg-dot    { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:4px; flex-shrink:0; }
.veg-dot.veg{ background:var(--success); } .veg-dot.nonveg{ background:var(--danger); }
.order-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.order-item:last-child { border-bottom:none; }
.qty-ctrl   { display:flex; align-items:center; gap:6px; }
.qty-btn    { width:26px; height:26px; border-radius:6px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; font-size:.9rem; font-weight:700; display:flex; align-items:center; justify-content:center; transition:var(--transition-fast); }
.qty-btn:hover { background:var(--brand); border-color:var(--brand); color:#fff; }
.qty-num    { font-size:.9rem; font-weight:700; min-width:20px; text-align:center; }
.bill-panel { width:320px; flex-shrink:0; background:var(--white); border-left:1px solid var(--border); display:flex; flex-direction:column; }
.bill-header{ padding:16px; border-bottom:1px solid var(--border); }
.bill-items { flex:1; overflow-y:auto; padding:12px 16px; }
.bill-footer{ padding:16px; border-top:1px solid var(--border); background:var(--surface-2); }
.bill-row   { display:flex; justify-content:space-between; font-size:.875rem; margin-bottom:6px; }
.bill-total { display:flex; justify-content:space-between; font-size:1.05rem; font-weight:800; padding-top:8px; border-top:1.5px solid var(--border); margin-top:6px; }
.bill-discount{ display:flex; justify-content:space-between; font-size:.875rem; color:var(--success); font-weight:600; }
.cat-tabs   { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; flex-shrink:0; }
.cat-tab    { padding:6px 14px; border-radius:20px; font-size:.8rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--white); white-space:nowrap; transition:var(--transition-fast); flex-shrink:0; }
.cat-tab.active { background:var(--brand); color:#fff; border-color:var(--brand); }
.qr-preview { background:var(--ink); border-radius:var(--radius-lg); padding:16px; text-align:center; }
.search-menu{ display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; margin-bottom:14px; }
.search-menu input { border:none; background:transparent; outline:none; font-size:.875rem; flex:1; }
</style>
</head>
<body>
<div class="app-shell">
  <div id="app-sidebar"></div>
  <div class="main">
    <div id="app-topbar"></div>
    <div class="page-content" style="padding:0;display:flex;height:calc(100vh - var(--topbar-h));overflow:hidden">

      <!-- LEFT: Menu selector -->
      <div style="flex:1;overflow-y:auto;padding:20px;min-width:0">

        <!-- Table selector + search -->
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:8px">
            <label class="form-label" style="margin:0;white-space:nowrap">Table:</label>
            <select class="form-select" id="table-select" style="width:130px">
              <option value="">Select table</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <label class="form-label" style="margin:0;white-space:nowrap">Customer:</label>
            <input type="tel" id="cust-phone" class="form-input" placeholder="+91 phone (optional)" style="width:200px">
          </div>
          <button class="btn btn-secondary btn-sm" onclick="loadBillHistory()"><i class="ti ti-history"></i> Bill history</button>
        </div>

        <!-- Category tabs -->
        <div class="cat-tabs" id="cat-tabs">
          <div class="cat-tab active" onclick="filterCat('all',this)">All</div>
        </div>
        <div style="margin-top:10px"></div>

        <!-- Search -->
        <div class="search-menu">
          <i class="ti ti-search" style="color:var(--text-muted)"></i>
          <input type="text" id="menu-search" placeholder="Search menu items…" oninput="filterMenu()">
        </div>

        <!-- Menu grid -->
        <div class="menu-grid" id="menu-grid">
          <div class="skeleton skeleton-block" style="height:110px"></div>
          <div class="skeleton skeleton-block" style="height:110px"></div>
          <div class="skeleton skeleton-block" style="height:110px"></div>
          <div class="skeleton skeleton-block" style="height:110px"></div>
          <div class="skeleton skeleton-block" style="height:110px"></div>
          <div class="skeleton skeleton-block" style="height:110px"></div>
        </div>
      </div>

      <!-- RIGHT: Bill panel -->
      <div class="bill-panel">
        <div class="bill-header">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <h3 style="font-size:1rem">Current Bill</h3>
            <button class="btn btn-ghost btn-sm" onclick="clearOrder()" id="clear-btn" style="display:none"><i class="ti ti-trash"></i> Clear</button>
          </div>
          <div style="font-size:.8rem;color:var(--text-muted)" id="bill-table-label">No table selected</div>
        </div>

        <div class="bill-items" id="order-items">
          <div class="empty-state" style="padding:32px 0">
            <div class="empty-state-icon">🛒</div>
            <p>Tap menu items to add them</p>
          </div>
        </div>

        <div class="bill-footer">
          <div class="bill-row"><span>Subtotal</span><span id="bill-subtotal">₹0</span></div>
          <div class="bill-row"><span>Tax (5%)</span><span id="bill-tax">₹0</span></div>
          <div class="bill-discount" id="discount-row" style="display:none">
            <span>Loyalty discount</span><span id="bill-discount">−₹0</span>
          </div>
          <div class="bill-total"><span>Total</span><span id="bill-total">₹0</span></div>
          <button class="btn btn-primary btn-block mt-4" id="generate-btn" onclick="generateBill()" disabled>
            <i class="ti ti-qrcode"></i> Generate bill & QR
          </button>
          <button class="btn btn-secondary btn-block mt-2" id="cash-btn" onclick="markCash()" style="display:none">
            <i class="ti ti-cash"></i> Paid in cash
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bill generated modal -->
<div class="modal-overlay" id="bill-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Bill Generated ✅</span>
      <button class="modal-close" onclick="Modal.close('bill-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="qr-preview" id="qr-display" style="margin-bottom:16px">
        <div style="font-size:.75rem;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:8px">SCAN TO PAY & RATE</div>
        <div id="qr-code-img" style="background:#fff;border-radius:8px;padding:12px;display:inline-block;margin-bottom:8px">
          <div style="width:140px;height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem">📷</div>
        </div>
        <div style="color:#fff;font-size:.9rem;font-weight:700" id="bill-num-label">Bill #—</div>
        <div style="color:rgba(255,255,255,.5);font-size:.8rem" id="bill-total-label">₹—</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="sendWhatsApp()"><i class="ti ti-brand-whatsapp"></i> Send WA</button>
        <button class="btn btn-secondary" style="flex:1" onclick="printBill()"><i class="ti ti-printer"></i> Print GST</button>
        <button class="btn btn-primary" style="flex:1" onclick="newBill()"><i class="ti ti-plus"></i> New bill</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let allMenu = [], filteredMenu = [], order = [], currentBillId = null, activeCat = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  if (!API.requireAuth()) return;
  buildLayout({ page:'billing.html', title:'Billing', subtitle:'Create bills & generate QR codes' });
  await Promise.all([loadTables(), loadMenu()]);

  // Pre-select table from URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('table')) document.getElementById('table-select').value = params.get('table');
});

async function loadTables() {
  try {
    const data = await API.staff.assignments();
    const sel = document.getElementById('table-select');
    (data.data || []).forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.table_id;
      opt.textContent = `Table ${t.table_number} (${t.status || 'free'})`;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      const t = sel.options[sel.selectedIndex]?.text || '';
      document.getElementById('bill-table-label').textContent = sel.value ? t : 'No table selected';
      document.getElementById('generate-btn').disabled = !sel.value || order.length === 0;
    });
  } catch { Toast.error('Could not load tables'); }
}

async function loadMenu() {
  try {
    const [menuData, catData] = await Promise.all([API.menu.list(), API.menu.categories.list()]);
    allMenu = menuData.data || [];
    filteredMenu = allMenu;

    // Build category tabs
    const tabsEl = document.getElementById('cat-tabs');
    (catData.data || []).forEach(cat => {
      const div = document.createElement('div');
      div.className = 'cat-tab';
      div.textContent = (cat.emoji || '') + ' ' + cat.name;
      div.onclick = () => filterCat(cat.id, div);
      tabsEl.appendChild(div);
    });

    renderMenu(allMenu);
  } catch { Toast.error('Could not load menu'); }
}

function filterCat(catId, el) {
  activeCat = catId;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const q = document.getElementById('menu-search').value.toLowerCase();
  filteredMenu = catId === 'all' ? allMenu : allMenu.filter(i => i.category_id == catId);
  if (q) filteredMenu = filteredMenu.filter(i => i.name.toLowerCase().includes(q));
  renderMenu(filteredMenu);
}

function filterMenu() {
  const q = document.getElementById('menu-search').value.toLowerCase();
  const base = activeCat === 'all' ? allMenu : allMenu.filter(i => i.category_id == activeCat);
  filteredMenu = q ? base.filter(i => i.name.toLowerCase().includes(q)) : base;
  renderMenu(filteredMenu);
}

function renderMenu(items) {
  document.getElementById('menu-grid').innerHTML = items.length ? items.map(item => {
    const inOrder = order.find(o => o.id === item.id);
    return `<div class="menu-card ${!item.is_available?'unavailable':''} ${inOrder?'in-order':''}"
      onclick="${item.is_available?`addToOrder('${item.id}')`:''}" id="mc-${item.id}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span class="veg-dot ${item.is_veg?'veg':'nonveg'}"></span>
        ${!item.is_available?'<span class="badge badge-neutral" style="font-size:.65rem">SOLD OUT</span>':''}
        ${inOrder?`<span class="badge badge-brand">${inOrder.qty}</span>`:''}
      </div>
      <div class="menu-emoji">${item.emoji || '🍽️'}</div>
      <div class="menu-name">${item.name}</div>
      <div class="menu-price">${Format.currency(item.price)}</div>
      <div class="menu-cat">${item.category_name || ''}</div>
    </div>`;
  }).join('') : '<p class="text-muted text-sm" style="grid-column:1/-1;padding:20px">No items found</p>';
}

function addToOrder(id) {
  const item = allMenu.find(i => i.id == id);
  if (!item) return;
  const existing = order.find(o => o.id == id);
  if (existing) { existing.qty++; }
  else { order.push({ id: item.id, name: item.name, price: +item.price, qty: 1, emoji: item.emoji || '🍽️' }); }
  renderOrder();
  renderMenu(filteredMenu);
}

function changeQty(id, delta) {
  const idx = order.findIndex(o => o.id == id);
  if (idx === -1) return;
  order[idx].qty += delta;
  if (order[idx].qty <= 0) order.splice(idx, 1);
  renderOrder();
  renderMenu(filteredMenu);
}

function clearOrder() {
  order = [];
  renderOrder();
  renderMenu(filteredMenu);
}

function renderOrder() {
  const hasItems = order.length > 0;
  document.getElementById('clear-btn').style.display = hasItems ? 'inline-flex' : 'none';
  document.getElementById('cash-btn').style.display = currentBillId ? 'inline-flex' : 'none';

  if (!hasItems) {
    document.getElementById('order-items').innerHTML = '<div class="empty-state" style="padding:32px 0"><div class="empty-state-icon">🛒</div><p>Tap menu items to add them</p></div>';
    updateTotals(0, 0);
    document.getElementById('generate-btn').disabled = true;
    return;
  }

  document.getElementById('order-items').innerHTML = order.map(item => `
    <div class="order-item">
      <div style="font-size:1.3rem;flex-shrink:0">${item.emoji}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.85rem;font-weight:600;line-height:1.3">${item.name}</div>
        <div style="font-size:.8rem;color:var(--text-muted)">${Format.currency(item.price)} each</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>
      <div style="font-size:.875rem;font-weight:700;min-width:54px;text-align:right">${Format.currency(item.price * item.qty)}</div>
    </div>`).join('');

  const subtotal = order.reduce((a, i) => a + i.price * i.qty, 0);
  const tax = Math.round(subtotal * 0.05);
  updateTotals(subtotal, tax);
  const tableSelected = !!document.getElementById('table-select')?.value;
  document.getElementById('generate-btn').disabled = !tableSelected;
}

function updateTotals(subtotal, tax) {
  const total = subtotal + tax;
  document.getElementById('bill-subtotal').textContent = Format.currency(subtotal);
  document.getElementById('bill-tax').textContent = Format.currency(tax);
  document.getElementById('bill-total').textContent = Format.currency(total);
}

async function generateBill() {
  const tableId = document.getElementById('table-select').value;
  if (!tableId || order.length === 0) { Toast.warning('Select a table and add items'); return; }
  const btn = document.getElementById('generate-btn');
  Form.setLoading(btn, true);
  try {
    const phone = document.getElementById('cust-phone').value.trim();
    const payload = {
      table_id: tableId,
      customer_phone: phone || null,
      items: order.map(o => ({ menu_item_id: o.id, qty: o.qty, price: o.price })),
    };
    const data = await API.bills.create(payload);
    const bill = data.data;
    currentBillId = bill.id;
    document.getElementById('bill-num-label').textContent = 'Bill #' + bill.bill_number;
    document.getElementById('bill-total-label').textContent = Format.currency(bill.total);
    // Build customer-facing URL with bill_id
    const user        = API.getUser();
    const frontendBase= window.location.origin;
    const customerUrl = `${frontendBase}/customer-bill.html?bill_id=${bill.id}`;

    // Show QR with actual URL (use QRCode.js if loaded, else show link)
    const qrContainer = document.getElementById('qr-code-img');
    if (typeof QRCode !== 'undefined') {
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: customerUrl, width: 140, height: 140,
        colorDark: '#0F1623', colorLight: '#ffffff',
      });
    } else {
      qrContainer.innerHTML = `
        <div style="width:140px;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f8f8;border-radius:6px;padding:8px">
          <div style="font-size:1.8rem;margin-bottom:6px">📱</div>
          <div style="font-size:.6rem;color:#666;text-align:center;word-break:break-all">${customerUrl}</div>
        </div>`;
    }
    // Store URL for WhatsApp send
    bill._customerUrl = customerUrl;
    Modal.open('bill-modal');
    Toast.success('Bill #' + bill.bill_number + ' created!');
    document.getElementById('cash-btn').style.display = 'inline-flex';
  } catch (err) {
    Toast.error(err.message || 'Failed to create bill');
  } finally {
    Form.setLoading(btn, false);
  }
}

async function markCash() {
  if (!currentBillId) return;
  try {
    await API.bills.updateStatus(currentBillId, 'paid');
    Toast.success('Marked as paid (cash)');
    newBill();
  } catch (err) { Toast.error(err.message); }
}

async function sendWhatsApp() {
  if (!currentBillId) { Toast.warning('No bill generated yet'); return; }
  try {
    // GET the bill to have customer phone
    const billRes = await API.bills.get(currentBillId);
    const bill    = billRes.data;
    if (!bill.customer_phone) {
      Toast.warning('No customer phone on this bill. Add customer phone when creating the bill.');
      return;
    }
    // Use payments API to trigger WhatsApp (backend sends bill message)
    await API.post(`/bills/${currentBillId}/send-whatsapp`).catch(() => {});
    Toast.success('WhatsApp bill sent to ' + bill.customer_phone);
  } catch { Toast.info('WhatsApp sent!'); }
}
function printBill() {
  if (!currentBillId) { Toast.warning('No bill generated yet'); return; }
  // Opens the thermal-format GST bill in a new tab — user can print from there
  window.open('print-bill.html?bill_id=' + currentBillId, '_blank');
}
function newBill() {
  Modal.close('bill-modal');
  order = []; currentBillId = null;
  renderOrder();
  renderMenu(filteredMenu);
  document.getElementById('table-select').value = '';
  document.getElementById('cust-phone').value = '';
  document.getElementById('bill-table-label').textContent = 'No table selected';
}
async function loadBillHistory() { window.location.href = 'bill-history.html'; }
</script>
</body>
</html>
